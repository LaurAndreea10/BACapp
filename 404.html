<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#06090f">
  <title>Pagina nu a fost găsită · BAC Space</title>
  <style>
    :root{color-scheme:dark;--bg:#06090f;--card:#0b0f1a;--line:rgba(255,255,255,.1);--gold:#e4a84c;--text:#e0e4f0;--muted:#7a84a0}
    *{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;padding:24px;background:radial-gradient(circle at 80% 0%,rgba(228,168,76,.12),transparent 35%),var(--bg);font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:var(--text)}
    main{width:min(560px,100%);padding:32px;border:1px solid var(--line);border-radius:24px;background:rgba(11,15,26,.86);box-shadow:0 16px 48px rgba(0,0,0,.35);text-align:center}
    .code{font-size:4rem;font-weight:800;color:var(--gold);line-height:1;margin:0 0 12px}
    h1{font-size:1.7rem;margin:0 0 10px}p{margin:0 0 22px;color:var(--muted);line-height:1.7}
    a{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:12px 18px;border-radius:999px;background:var(--gold);color:#080b14;text-decoration:none;font-weight:700}
  </style>
</head>
<body>
  <main>
    <div class="code">404</div>
    <h1>Pagina nu a fost găsită</h1>
    <p>Linkul accesat nu există sau a fost mutat. Revino în aplicația BAC Space și continuă pregătirea.</p>
    <a href="/BACapp/">Înapoi la dashboard</a>
  </main>
</body>
</html>
